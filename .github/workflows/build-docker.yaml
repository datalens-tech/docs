name: Build Docker

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Up version
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/datalens-docs

permissions:
  contents: read
  packages: write

jobs:
  run:
    name: build-docker
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'robot-charts' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: get latest tag
        id: tag
        run: |
          git fetch --tags
          TAG=$(git tag -l "v*" | sort -V | tail -n 1)
          VERSION=$(echo "${TAG}" | sed 's|^v||')
          echo "tag: ${TAG}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version: ${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
      - name: checkout latest tag
        run: git checkout ${{ steps.tag.outputs.tag }}
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: 'arm64'
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.version }}
            type=raw,value=latest
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
